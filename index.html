<!DOCTYPE html>
<head>
<title>Clock</title>
<!-- けしかん氏のフォント｢DSEG｣( https://github.com/keshikan/DSEG )をお借りしています｡ -->
<link rel="stylesheet" href="index.css">
</head>
<body>
    <span class="time" id="clock"></span>
  <script>
    function updateClock() {
      const now = new Date();
      const hours = now.getHours().toString().padStart(2, '0');
      const minutes = now.getMinutes().toString().padStart(2, '0');
      const mseconds = Date.now();
      const mseconds2 = (mseconds / 1000) % 60;
      const msresult = Math.floor(mseconds2 * 100) / 100;
      const timeresult  = `${hours}:${minutes}:${msresult.toFixed(2).padStart(5, '0')}`
      const replaced = timeresult.replace('.',':')
      document.getElementById("clock").textContent = `${replaced}`;
    }
    setInterval(updateClock, 10);
  </script></body>
